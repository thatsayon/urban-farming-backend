services:
  db:
    image: postgres:15-alpine
    container_name: urban_farming_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: urban_farming
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: urban_farming_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/urban_farming
      - PORT=5000
      - JWT_SECRET=dockersecretkey123
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
